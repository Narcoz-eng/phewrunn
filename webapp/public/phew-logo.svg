    <path d="M526 216h34"/>
  </g>

  <g stroke="url(#runnerStroke)" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="395" cy="66" r="13" fill="none" stroke-width="2.6"/>
    <circle cx="463" cy="66" r="13" fill="none" stroke-width="2.6"/>
    <path d="M356 96l28-26h35l-22 29" stroke-width="9.5"/>
    <path d="M385 103l-35 76 45-39" stroke-width="10.5"/>
    <path d="M397 109l38 5-20 25" stroke-width="8.2"/>
    <path d="M427 81l19 24" stroke-width="7"/>
    <path d="M441 111l38 66" stroke-width="10.5"/>
    <path d="M411 149l44 6" stroke-width="7.5"/>
